name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy via cloudflared tunnel
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          cloudflared access tcp --hostname "$DEPLOY_HOST" --listener localhost:2222 &
          sleep 3
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p 2222 "$DEPLOY_USER@localhost" "cd $DEPLOY_PATH && git pull origin main && echo 'Deployment completed at $(date)'"
          pkill cloudflared || true
